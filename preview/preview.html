<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HA Energy Heatmap Card — Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    padding: 40px 20px;
    min-height: 100vh;
  }
  body.light { background: #f0f2f5; color: #1a1a2e; }
  body.dark { background: #111; color: #e1e1e1; }

  .theme-toggle {
    position: fixed; top: 16px; right: 16px;
    padding: 8px 16px; border: none; border-radius: 8px;
    cursor: pointer; font-size: 14px; font-weight: 500;
    z-index: 100;
  }
  body.light .theme-toggle { background: #333; color: #fff; }
  body.dark .theme-toggle { background: #fff; color: #333; }

  .badge {
    text-align: center; font-size: 12px; opacity: 0.5;
    margin-bottom: -16px;
  }

  h2.section-header {
    font-size: 14px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1px; opacity: 0.4; margin-top: 8px;
  }

  /* Card Container */
  .ha-card {
    border-radius: 12px;
    width: 520px;
    max-width: 95vw;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  body.light .ha-card { background: #fff; border: 1px solid #e8e8e8; }
  body.dark .ha-card { background: #1c1c1e; border: 1px solid #333; }

  .card-header {
    padding: 16px 16px 0;
    font-size: 1.2em;
    font-weight: 500;
  }
  .card-content {
    padding: 16px;
    position: relative;
  }

  /* Stats */
  .stats-row {
    display: flex;
    justify-content: space-around;
    gap: 8px;
    margin-bottom: 8px;
  }
  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 12px;
    border-radius: 8px;
    flex: 1;
  }
  body.light .stat { border: 1px solid #e0e0e0; background: #fafafa; }
  body.dark .stat { border: 1px solid #333; background: #252528; }
  .stat-value { font-size: 1.1em; font-weight: 600; }
  .stat-label { font-size: 0.75em; opacity: 0.6; margin-top: 2px; }

  /* Section Title */
  .section-title {
    font-size: 0.85em;
    font-weight: 500;
    opacity: 0.5;
    margin: 16px 0 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .section-title:first-of-type { margin-top: 8px; }

  /* Heatmap */
  .heatmap-container { display: flex; overflow-x: auto; }
  .heatmap-y-labels {
    display: flex; flex-direction: column; margin-right: 4px;
  }
  .label-spacer { height: 20px; }
  .y-label {
    height: 16px; margin-bottom: 2px;
    display: flex; align-items: center;
    font-size: 0.7em; opacity: 0.5; padding-right: 4px;
  }
  .heatmap-grid-wrapper { flex: 1; min-width: 0; overflow-x: auto; }
  .heatmap-x-labels { display: flex; height: 20px; }
  .x-label {
    width: 54px; font-size: 0.7em; opacity: 0.5; text-align: center;
  }
  .heatmap-grid {
    display: flex; flex-direction: column; gap: 2px;
  }
  .heatmap-row { display: flex; gap: 2px; }
  .heatmap-cell {
    width: 16px; height: 16px; border-radius: 2px;
    cursor: pointer; transition: opacity 0.15s, transform 0.15s;
    position: relative;
  }
  .heatmap-cell:hover {
    opacity: 0.8; transform: scale(1.3); z-index: 1;
  }

  /* Calendar */
  .calendar-container { overflow-x: auto; }
  .calendar-grid { display: flex; gap: 2px; }
  .calendar-week { display: flex; flex-direction: column; gap: 2px; }
  .calendar-cell {
    width: 14px; height: 14px; border-radius: 2px;
    cursor: pointer; transition: opacity 0.15s, transform 0.15s;
  }
  .calendar-cell.empty { background: transparent; cursor: default; }
  .calendar-cell:not(.empty):hover {
    opacity: 0.8; transform: scale(1.3); z-index: 1;
  }

  /* Legend */
  .legend {
    display: flex; align-items: center; justify-content: flex-end;
    gap: 3px; margin-top: 12px;
  }
  .legend-label { font-size: 0.7em; opacity: 0.5; padding: 0 4px; }
  .legend-cell { width: 12px; height: 12px; border-radius: 2px; }

  /* Tooltip */
  .tooltip {
    position: absolute;
    padding: 4px 8px; border-radius: 4px;
    font-size: 0.8em; pointer-events: none;
    white-space: nowrap; z-index: 10;
    transform: translateX(-50%);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    display: none;
  }
  body.light .tooltip { background: #333; color: #fff; }
  body.dark .tooltip { background: #e1e1e1; color: #111; }

  /* Palette showcase */
  .palette-row {
    display: flex; gap: 24px; flex-wrap: wrap; justify-content: center;
  }
  .palette-demo {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .palette-demo span { font-size: 11px; opacity: 0.5; }
  .palette-cells { display: flex; gap: 2px; }
  .palette-cells div { width: 16px; height: 16px; border-radius: 2px; }
</style>
</head>
<body class="light">

<button class="theme-toggle" onclick="document.body.classList.toggle('light');document.body.classList.toggle('dark');">Toggle Dark Mode</button>

<div class="badge">HA Energy Heatmap Card v1.0.0 — Preview</div>

<!-- ===================== GREEN PALETTE (Main Preview) ===================== -->
<div class="ha-card" id="card-green"></div>

<!-- ===================== BLUE PALETTE ===================== -->
<h2 class="section-header">Alternative Palettes</h2>
<div class="ha-card" id="card-blue"></div>

<!-- ===================== PALETTE SHOWCASE ===================== -->
<div class="palette-row" id="palette-showcase"></div>

<script>
const PALETTES = {
  green:  ["#ebedf0","#9be9a8","#40c463","#30a14e","#216e39"],
  blue:   ["#ebedf0","#9ecae1","#6baed6","#3182bd","#08519c"],
  orange: ["#ebedf0","#fdbe85","#fd8d3c","#e6550d","#a63603"],
  red:    ["#ebedf0","#fcbba1","#fb6a4a","#de2d26","#a50f15"],
  purple: ["#ebedf0","#c6b3d9","#9e82c1","#756bb1","#54278f"],
  yellow: ["#ebedf0","#fff3b0","#ffd54f","#ffb300","#ff8f00"],
};

const DAY_LABELS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const HOUR_LABELS = Array.from({length:24},(_,i)=>i.toString().padStart(2,"0"));

// Generate realistic-looking mock energy data
function generateMockData(seed) {
  const rng = (s) => { s = Math.sin(s) * 10000; return s - Math.floor(s); };
  let s = seed;
  const next = () => { s++; return rng(s); };

  const grid = {};
  for (let d = 0; d < 7; d++) {
    grid[d] = {};
    for (let h = 0; h < 24; h++) {
      let base = 0.1;
      if (h >= 7 && h <= 9) base = 0.6;
      else if (h >= 17 && h <= 22) base = 0.8;
      else if (h >= 10 && h <= 16) base = 0.35;
      else if (h >= 23 || h <= 6) base = 0.08;
      if (d >= 5) {
        if (h >= 9 && h <= 14) base *= 1.3;
        if (h >= 7 && h <= 8) base *= 0.5;
      }
      grid[d][h] = { sum: base * (0.5 + next()) * 2.5, count: 1 };
    }
  }
  const calendarData = [];
  const today = new Date();
  for (let i = 29; i >= 0; i--) {
    const date = new Date(today);
    date.setDate(date.getDate() - i);
    const dow = (date.getDay() + 6) % 7;
    const base = dow >= 5 ? 12 : 9;
    calendarData.push({ date: date.toISOString().split("T")[0], total: Math.max(0.5, base + next() * 8 - 2) });
  }
  let maxVal=0,totalEnergy=0,peakHour=0,peakDay=0,peakVal=0;
  for (let d=0;d<7;d++) for (let h=0;h<24;h++) {
    const val=grid[d][h].sum; totalEnergy+=val;
    if(val>maxVal)maxVal=val; if(val>peakVal){peakVal=val;peakHour=h;peakDay=d;}
  }
  return {grid,maxVal,totalEnergy,peakHour,peakDay,calendarData,maxDaily:Math.max(...calendarData.map(d=>d.total)),avgDaily:totalEnergy/30};
}
function getColor(v,m,p){if(!v||v===0)return p[0];return p[Math.min(Math.floor(Math.min(v/m,1)*(p.length-1))+1,p.length-1)];}
function renderCard(id,title,pn,seed){const c=document.getElementById(id),p=PALETTES[pn],d=generateMockData(seed),u="kWh";let hr="";for(let dd=0;dd<7;dd++){let cs="";for(let h=0;h<24;h++){const v=d.grid[dd][h].sum;cs+=`<div class="heatmap-cell" style="background-color:${getColor(v,d.maxVal,p)}" title="${DAY_LABELS[dd]} ${HOUR_LABELS[h]}:00 ${v.toFixed(2)} ${u}"></div>`;}hr+=`<div class="heatmap-row">${cs}</div>`;}let xl="";for(let h=0;h<24;h+=3)xl+=`<div class="x-label">${HOUR_LABELS[h]}</div>`;let yl=`<div class="label-spacer"></div>`;for(const dd of DAY_LABELS)yl+=`<div class="y-label">${dd}</div>`;let lc="";for(const cc of p)lc+=`<div class="legend-cell" style="background-color:${cc}"></div>`;c.innerHTML=`<h1 class="card-header">${title}</h1><div class="card-content"><div class="stats-row"><div class="stat"><span class="stat-value">${d.totalEnergy.toFixed(1)}</span><span class="stat-label">Total ${u}</span></div><div class="stat"><span class="stat-value">${d.avgDaily.toFixed(2)}</span><span class="stat-label">Avg/day ${u}</span></div><div class="stat"><span class="stat-value">${DAY_LABELS[d.peakDay]} ${d.peakHour.toString().padStart(2,"0")}:00</span><span class="stat-label">Peak time</span></div></div><div class="section-title">Consumption by Hour &amp; Day</div><div class="heatmap-container"><div class="heatmap-y-labels">${yl}</div><div class="heatmap-grid-wrapper"><div class="heatmap-x-labels">${xl}</div><div class="heatmap-grid">${hr}</div></div></div><div class="legend"><span class="legend-label">Less</span>${lc}<span class="legend-label">More</span></div></div>`;}
function renderPaletteShowcase(){const el=document.getElementById("palette-showcase");let h="";for(const[n,cs]of Object.entries(PALETTES)){let c="";for(const cc of cs)c+=`<div style="background-color:${cc}"></div>`;h+=`<div class="palette-demo"><div class="palette-cells">${c}</div><span>${n}</span></div>`;}el.innerHTML=h;}
renderCard("card-green","Home Energy Usage","green",42);renderCard("card-blue","Solar Production","blue",99);renderPaletteShowcase();
</script>
</body>
</html>
